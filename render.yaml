services:
  - type: web
    name: karimnagar-frames
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: DATA_FILE
        value: /var/data/db.json
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: karimnagar-frames-data
      mountPath: /var/data
      sizeGB: 1
